name: Sync pnpm Docker Image with Latest Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      pnpm_version:
        description: 'Override pnpm version (e.g. 10.5.0). Leave empty to use latest.'
        required: false
        default: ''

concurrency:
  group: sync-pnpm
  cancel-in-progress: true

jobs:
  get-pnpm-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PNPM_VERSION: ${{ inputs.pnpm_version }}
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
      major: ${{ steps.get_tag.outputs.major }}
    steps:
      - name: Get latest pnpm release tag (without leading v)
        id: get_tag
        run: |
          if [ -n "$PNPM_VERSION" ]; then
            tag="$PNPM_VERSION"
          else
            tag=$(curl -s https://api.github.com/repos/pnpm/pnpm/releases/latest | jq -r '.tag_name')
            tag="${tag#v}"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "major=$(echo "$tag" | cut -d. -f1)" >> $GITHUB_OUTPUT

  build-pnpm:
    needs: get-pnpm-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      IMAGE_NAME: ghcr.io/yorukai/pnpm
      IMAGE_MAINTAINER: Dennis Rumpf <33402703+yorukai@users.noreply.github.com>
      LATEST_NODE: '25'
    strategy:
      fail-fast: false
      matrix:
        node_version: ['20', '22', '24', '25']
    steps:
      - name: Check if image already exists on GHCR
        id: check_image
        run: |
          TAG=${{ needs.get-pnpm-version.outputs.tag }}-node${{ matrix.node_version }}
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:yorukai/pnpm:pull" | jq -r '.token')
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://ghcr.io/v2/yorukai/pnpm/manifests/$TAG)
          if [ "$STATUS_CODE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check_image.outputs.exists == 'false'

      - name: Login to GitHub Container Registry
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        if: steps.check_image.outputs.exists == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            maintainer=${{ env.IMAGE_MAINTAINER }}
            description=Node.js ${{ matrix.node_version }} alpine image with pnpm ${{ needs.get-pnpm-version.outputs.tag }}
          tags: |
            # 10.32.1-node23  (full pnpm + specific node — always)
            type=raw,value=${{ needs.get-pnpm-version.outputs.tag }}-node${{ matrix.node_version }}
            # 10-node23  (pnpm major + specific node — always)
            type=raw,value=${{ needs.get-pnpm-version.outputs.major }}-node${{ matrix.node_version }}
            # node23  (latest pnpm + specific node — always)
            type=raw,value=node${{ matrix.node_version }}
            # 10.32.1  (full pnpm, latest node implied — latest node only)
            type=raw,value=${{ needs.get-pnpm-version.outputs.tag }},enable=${{ matrix.node_version == env.LATEST_NODE }}
            # 10  (pnpm major, latest node implied — latest node only)
            type=raw,value=${{ needs.get-pnpm-version.outputs.major }},enable=${{ matrix.node_version == env.LATEST_NODE }}
            # latest  (latest pnpm + latest node — latest node only)
            type=raw,value=latest,enable=${{ matrix.node_version == env.LATEST_NODE }}

      - name: Build and push Docker image
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha,scope=node${{ matrix.node_version }}
          cache-to: type=gha,mode=max,scope=node${{ matrix.node_version }}
          context: .
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PNPM_VERSION=${{ needs.get-pnpm-version.outputs.tag }}
            NODE_VERSION=${{ matrix.node_version }}
