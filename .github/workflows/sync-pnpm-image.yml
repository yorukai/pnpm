name: Sync pnpm Docker Image with Latest Release

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      pnpm_version:
        description: 'Override pnpm version (e.g. 10.32.1). Leave empty to use latest.'
        required: false
        default: ''

concurrency:
  group: sync-pnpm
  cancel-in-progress: true

jobs:
  get-pnpm-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PNPM_VERSION: ${{ inputs.pnpm_version }}
    outputs:
      pnpm_version: ${{ steps.get_tag.outputs.pnpm_version }}
      pnpm_major_version: ${{ steps.get_tag.outputs.pnpm_major_version }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Get latest pnpm release tag (without leading v)
        id: get_tag
        run: |
          if [ -n "$PNPM_VERSION" ]; then
            tag="$PNPM_VERSION"
          else
            tag=$(curl -s https://api.github.com/repos/pnpm/pnpm/releases/latest | jq -r '.tag_name')
            tag="${tag#v}"
          fi
          echo "pnpm_version=$tag" >> $GITHUB_OUTPUT
          echo "pnpm_major_version=$(echo "$tag" | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Check if any image is missing on GHCR
        id: check
        run: |
          set -euo pipefail

          pnpm_version='${{ steps.get_tag.outputs.pnpm_version }}'
          token=$(curl -s "https://ghcr.io/token?scope=repository:yorukai/pnpm:pull" | jq -r '.token')

          status_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $token" \
            "https://ghcr.io/v2/yorukai/pnpm/manifests/$pnpm_version")

          if [ "$status_code" = '200' ]; then
            should_build='false'
          else
            echo "Missing image tag: $pnpm_version"
            should_build='true'
          fi

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"

  build-pnpm:
    needs: get-pnpm-version
    if: needs.get-pnpm-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/yorukai/pnpm
      IMAGE_MAINTAINER: Dennis Rumpf <33402703+yorukai@users.noreply.github.com>
      LATEST_NODE: '25'
    strategy:
      fail-fast: false
      matrix:
        node_version: ['20', '22', '24', '25']
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            maintainer=${{ env.IMAGE_MAINTAINER }}
            description=Node.js ${{ matrix.node_version }} alpine image with pnpm ${{ needs.get-pnpm-version.outputs.pnpm_version }}
          tags: |
            # 10.32.1-node25  (full pnpm + specific node — always)
            type=raw,value=${{ needs.get-pnpm-version.outputs.pnpm_version }}-node${{ matrix.node_version }}
            # 10-node25  (pnpm major + specific node — always)
            type=raw,value=${{ needs.get-pnpm-version.outputs.pnpm_major_version }}-node${{ matrix.node_version }}
            # node25  (latest pnpm + specific node — always)
            type=raw,value=node${{ matrix.node_version }}
            # 10.32.1  (full pnpm, latest node implied — latest node only)
            type=raw,value=${{ needs.get-pnpm-version.outputs.pnpm_version }},enable=${{ matrix.node_version == env.LATEST_NODE }}
            # 10  (pnpm major, latest node implied — latest node only)
            type=raw,value=${{ needs.get-pnpm-version.outputs.pnpm_major_version }},enable=${{ matrix.node_version == env.LATEST_NODE }}
            # latest  (latest pnpm + latest node — latest node only)
            type=raw,value=latest,enable=${{ matrix.node_version == env.LATEST_NODE }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PNPM_VERSION=${{ needs.get-pnpm-version.outputs.pnpm_version }}
            NODE_VERSION=${{ matrix.node_version }}

  cleanup-untagged-images:
    needs: [build-pnpm, get-pnpm-version]
    if: needs.get-pnpm-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Delete untagged GHCR image versions
        uses: actions/delete-package-versions@v5
        with:
          owner: ${{ github.repository_owner }}
          package-name: pnpm
          package-type: container
          min-versions-to-keep: 0
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}